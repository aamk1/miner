<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IWA 矿场</title>
    <!-- 引入 Telegram Mini App 核心通信 SDK -->
    <script src="telegram.org"></script>
    <style>
        body { margin: 0; background-color: #111; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
        .card { background: #222; border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; width: 80%; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .tip { color: #f1c40f; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .title { color: #aaa; font-size: 14px; margin-bottom: 10px; }
        .balance-box { display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; color: #f39c12; }
        .coin-icon { width: 30px; height: 30px; margin-right: 10px; background: #f1c40f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 18px; font-weight: bold; }
        .click-area { width: 200px; height: 200px; background: linear-gradient(145deg, #e67e22, #d35400); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(211,84,0,0.6); cursor: pointer; transition: transform 0.1s ease; }
        .click-area:active { transform: scale(0.95); }
        .pickaxe { font-size: 80px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .status-bar { color: #2ecc71; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="uid" class="tip">等待 Telegram 身份注入...</div>

    <div class="card">
        <div class="title">当前实时算力收益</div>
        <div class="balance-box">
            <div class="coin-icon">$</div>
            <span id="bal">0.0000</span>
        </div>
    </div>

    <div id="mbtn" class="click-area">
        <div class="pickaxe">⛏️</div>
    </div>

    <div class="status-bar">电报云端数据库同步中</div>

    <script>
        let balance = 0.0000;
        const mineRate = 0.0015;
        let userId = "guest";

        // 强行通过 Telegram WebApp 对象激活
        const tg = window.Telegram?.WebApp;

        function initTelegramApp() {
            if (tg) {
                tg.ready();
                tg.expand();
                
                // 核心：读取电报客户端传过来的原生数据包
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    userId = user.id.toString();
                    document.getElementById('uid').innerText = "矿工账号: " + (user.username || user.first_name);
                } else {
                    document.getElementById('uid').innerText = "电报内置通道已建立";
                }
            } else {
                document.getElementById('uid').innerText = "非电报客户端打开";
            }

            // 从云端調取 Redis 数据
            fetch(`/api/balance?userId=${userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.balance) {
                        balance = parseFloat(data.balance);
                        document.getElementById('bal').innerText = balance.toFixed(4);
                    }
                }).catch(e => console.log("新矿工初始化"));
        }

        const btn = document.getElementById('mbtn');
        const balDisplay = document.getElementById('bal');

        if (btn && balDisplay) {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                balance += mineRate;
                balDisplay.innerText = balance.toFixed(4);
                
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }

                // 同步至云端
                fetch('/api/balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId, balance: balance })
                }).catch(e => console.error("同步延迟"));
            });
        }

        // 强制确保通信就绪
        if (tg) {
            initTelegramApp();
        } else {
            window.addEventListener('load', initTelegramApp);
        }
    </script>
</body>
</html>
