<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>复刻版矿场</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .user-info { position: absolute; top: 20px; left: 20px; font-size: 14px; color: #aaa; }
        .balance-title { font-size: 18px; color: #888; }
        .balance-amount { font-size: 48px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .mine-btn { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, #f39c12, #d35400); border: 8px solid #333; box-shadow: 0 0 30px rgba(243, 156, 18, 0.4); cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .mine-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="user-info">ID: <span id="userid">读取中...</span></div>
    <div class="balance-title">当前余额</div>
    <div class="balance-amount">💰 <span id="balance">0.0000</span></div>
    <button class="mine-btn" onclick="tapMine()">⛏️</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // 让网页撑满全屏
        
        let balance = 0;
        document.getElementById('userid').innerText = tg.initDataUnsafe.user?.id || "本地测试";

        function tapMine() {
            balance += 0.0001;
            document.getElementById('balance').innerText = balance.toFixed(4);
            tg.HapticFeedback.impactOccurred('medium'); // 手机震动反馈，复刻手感
        }
    </script>
</body>
</html>
