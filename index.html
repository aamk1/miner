<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高级复刻矿池</title>
    <!-- 【核心电缆】这行一个字母都不能改，这是链接Telegram大脑的唯一通道 -->
    <script src="https://telegram.org"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .bal { font-size: 50px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .btn { width: 180px; height: 180px; border-radius: 50%; background: #e67e22; border: 5px solid #333; font-size: 70px; cursor: pointer; outline: none; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div style="color:#f1c40f">矿工协议: <span id="uid">正在识别...</span></div>
    <div class="bal">💰 <span id="bal">0.0000</span></div>
    <button class="btn" id="mbtn">⛏️</button>

    <script>
        // 1. 强制唤醒 Telegram 神经系统
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function startApp() {
            // 2. 读取用户 ID
            const user = tg.initDataUnsafe.user;
            const uid = user ? user.id : "测试模式";
            document.getElementById('uid').innerText = "矿工ID: " + uid;

            // 3. 读取存档
            let score = parseFloat(localStorage.getItem('pro_bal_' + uid)) || 0;
            document.getElementById('bal').innerText = score.toFixed(4);

            // 4. 点击逻辑
            document.getElementById('mbtn').onclick = () => {
                score += 0.0005;
                document.getElementById('bal').innerText = score.toFixed(4);
                localStorage.setItem('pro_bal_' + uid, score);
                tg.HapticFeedback.impactOccurred('heavy');
            };

            // 5. 真正的干货：自动产矿（每秒增加）
            setInterval(() => {
                score += 0.0001;
                document.getElementById('bal').innerText = score.toFixed(4);
                localStorage.setItem('pro_bal_' + uid, score);
            }, 1000);
        }

        // 页面加载完立刻执行
        window.onload = startApp;
    </script>
</body>
</html>
