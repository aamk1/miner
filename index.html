<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>复刻版矿场</title>
    <!-- 核心修复点：完整的神经系统链接 -->
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; -webkit-user-select: none; }
        .balance-amount { font-size: 48px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .mine-btn { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #f39c12, #d35400); border: 8px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 80px; transition: transform 0.1s; outline: none; }
        .mine-btn:active { transform: scale(0.92); }
        .user-id { color: #f1c40f; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="user-id">矿工 ID: <span id="userid">同步中...</span></div>
    <div style="color: #888;">当前账户余额</div>
    <div class="balance-amount">💰 <span id="balance">0.0000</span></div>
    <button class="mine-btn" id="mineBtn">⛏️</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "测试模式";
        document.getElementById('userid').innerText = userId;

        let balance = parseFloat(localStorage.getItem('bal_' + userId)) || 0;
        document.getElementById('balance').innerText = balance.toFixed(4);

        const btn = document.getElementById('mineBtn');
        btn.addEventListener('click', () => {
            balance += 0.0001;
            document.getElementById('balance').innerText = balance.toFixed(4);
            localStorage.setItem('bal_' + userId, balance);
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
