<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>复刻矿场</title>
    <!-- 这行必须单独占一行，且一个字母都不能错 -->
    <script src="https://telegram.org"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .bal { font-size: 50px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .btn { width: 180px; height: 180px; border-radius: 50%; background: #e67e22; border: 5px solid #333; font-size: 70px; cursor: pointer; outline: none; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div style="color:#f1c40f">矿工ID: <span id="uid">正在链接...</span></div>
    <div class="bal">💰 <span id="num">0.0000</span></div>
    <button class="btn" id="mbtn">⛏️</button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        function update() {
            const user = tg.initDataUnsafe.user;
            const uid = user ? user.id : "测试模式";
            document.getElementById('uid').innerText = uid;
            let score = parseFloat(localStorage.getItem('b_' + uid)) || 0;
            document.getElementById('num').innerText = score.toFixed(4);
            document.getElementById('mbtn').onclick = () => {
                score += 0.0001;
                document.getElementById('num').innerText = score.toFixed(4);
                localStorage.setItem('b_' + uid, score);
                tg.HapticFeedback.impactOccurred('medium');
            };
        }
        window.onload = update;
    </script>
</body>
</html>
