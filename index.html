<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>复刻矿场</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0f0f0f; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .balance { font-size: 45px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .btn { width: 180px; height: 180px; border-radius: 50%; background: #e67e22; border: 6px solid #333; font-size: 70px; cursor: pointer; }
    </style>
</head>
<body>
    <div style="color:#f1c40f">矿工ID: <span id="uid">正在链接...</span></div>
    <div style="margin-top:20px;color:#888">当前余额</div>
    <div class="balance">💰 <span id="bal">0.0000</span></div>
    <button class="btn" id="mbtn">⛏️</button>

    <script>
        // 强制初始化
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 获取ID逻辑
        const user = tg.initDataUnsafe.user;
        const uid = user ? user.id : "测试模式";
        document.getElementById('uid').innerText = uid;

        // 余额逻辑
        let score = parseFloat(localStorage.getItem('mybal_' + uid)) || 0;
        document.getElementById('bal').innerText = score.toFixed(4);

        // 点击逻辑
        document.getElementById('mbtn').onclick = function() {
            score += 0.0001;
            document.getElementById('bal').innerText = score.toFixed(4);
            localStorage.setItem('mybal_' + uid, score);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        };
    </script>
</body>
</html>
